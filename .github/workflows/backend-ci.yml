name: Backend CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  python-backend-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend_python

    env:
      SECRET_KEY: ci-secret-key
      OPENAI_API_KEY: ""
      DATABASE_URL: sqlite:///./ci_test.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  cpp-backend-build:
    name: C++ Backend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend_cpp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake .

      - name: Build
        run: make -j2
