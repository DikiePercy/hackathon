services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: hackathon_db
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: hackathon
    volumes:
      - ${DB_DATA_DIR:-./runtime-data/postgres}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hackathon_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. ChromaDB Vector Database
  vector_db:
    image: chromadb/chroma:latest
    container_name: hackathon_vector_db
    volumes:
      - ${CHROMA_DATA_DIR:-./runtime-data/chroma}:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - hackathon_network
    environment:
      - IS_PERSISTENT=TRUE

  # 3. C++ Backend (Text Processing)
  cpp_backend:
    build: ./backend_cpp
    container_name: hackathon_cpp
    ports:
      - "8080:8080"
    networks:
      - hackathon_network
    restart: unless-stopped
    # ВАЖНО: Если в main.cpp еще нет эндпоинта GET /health, закомментируй эти 5 строк ниже,
    # иначе healthcheck упадет и python_backend не запустится!
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Python Backend (FastAPI)
  python_backend:
    build: ./backend_python
    container_name: hackathon_python
    network_mode: "host"
    depends_on:
      db:
        condition: service_healthy
      cpp_backend:
        condition: service_healthy
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RAG_LLM_PROVIDER=${RAG_LLM_PROVIDER:-gemini}
      - RAG_GEMINI_MODEL=${RAG_GEMINI_MODEL:-gemini-1.5-flash}
      - RAG_CLAUDE_MODEL=${RAG_CLAUDE_MODEL:-claude-3-5-sonnet-20240620}
      - RAG_EMBEDDING_PROVIDER=${RAG_EMBEDDING_PROVIDER:-gemini}
      - RAG_GEMINI_EMBEDDING_MODEL=${RAG_GEMINI_EMBEDDING_MODEL:-models/embedding-001}
      - RAG_OPENAI_EMBEDDING_MODEL=${RAG_OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - RAG_OLLAMA_MODEL=${RAG_OLLAMA_MODEL:-llama3:8b}
      - CPP_BACKEND_URL=http://localhost:8080
      - SECRET_KEY=${SECRET_KEY:-hackathon-secret-change-me}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-AdminSecure123}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      - DATABASE_URL=${DATABASE_URL:-postgresql://hackathon:hackathon@localhost:5432/hackathon}
      - CHROMA_HOST=localhost
      - CHROMA_PORT=8001
    volumes:
      - ${APP_DATA_DIR:-./runtime-data/app}:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 5. Streamlit Frontend
  frontend:
    build:
      context: ./frontend_python
      dockerfile: Dockerfile
    container_name: hackathon_frontend
    ports:
      - "8501:8501"
    networks:
      - hackathon_network
    environment:
      - BACKEND_URL=http://python_backend:8000
    depends_on:
      python_backend:
        condition: service_healthy

  # 6. Static Web Frontend (port 80)
  web_front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: hackathon_web
    ports:
      - "80:80"
    networks:
      - hackathon_network
    depends_on:
      python_backend:
        condition: service_healthy

networks:
  hackathon_network:
    driver: bridge