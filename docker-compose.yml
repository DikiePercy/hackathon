version: "3.8"

services:
  db:
    image: postgres:15
    container_name: archive_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archive}
      POSTGRES_DB: ${POSTGRES_DB:-archive}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archive} -d ${POSTGRES_DB:-archive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vectordb:
    image: chromadb/chroma:latest
    container_name: archive_vectordb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  cpp_backend:
    build: ./backend_cpp
    container_name: archive_cpp_backend
    restart: unless-stopped
    ports:
      - "8080:8080"

  python_backend:
    build: ./backend_python
    container_name: archive_python_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://archive:archive@db:5432/archive}
      CPP_BACKEND_URL: http://cpp_backend:8080
      CHROMA_HOST: vectordb
      CHROMA_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    depends_on:
      db:
        condition: service_healthy
      cpp_backend:
        condition: service_started
      vectordb:
        condition: service_started

  frontend:
    build: ./frontend_python
    container_name: archive_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://python_backend:8000
    depends_on:
      python_backend:
        condition: service_started

volumes:
  postgres_data:
  chroma_data:
